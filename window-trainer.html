<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тренажер вікон Windows</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #76add8;
    --surface: #32a0fa;
    --card: #202030;
    --border: rgba(255,255,255,0.1);
    --accent: #3fe3eb;
    --accent2: #074df0;
    --text: #e0e0e0;
    --muted: #7a7a9a;
    --success: #00f5a0;
    --danger: #ff4757;
    --warn: #ffa502;
    --close-red: #e81123;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    position: relative;
  }
  #desktop {
    position: fixed;
    inset: 0;
    bottom: 48px;
    z-index: 0;
  }

  body {
    background: #333 url(../img/pattern.svg) repeat center;
    color: white;
    text-align: center;
    padding: 40px;
    margin: 0;
  }

  body:before {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 75%;
    height: 100%;
    background: url(../img/decor-parts.svg) no-repeat right top;
    z-index: 0;
  }

  /* HUD */
  #hud {
    position: fixed;
    top: 20px; right: 20px;
    z-index: 1000;
    background: rgba(10,10,22,0.93);
    border: 1px solid rgba(0,180,216,0.3);
    border-radius: 8px;
    padding: 16px 20px;
    backdrop-filter: blur(16px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    min-width: 240px;
  }
  #hud-title {
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
  }
  .hud-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:.2} }
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat {
    background: rgba(0,180,216,0.07);
    border: 1px solid rgba(0,180,216,0.15);
    border-radius: 6px;
    padding: 8px 6px;
    text-align: center;
  }
  .stat-value {
    font-size: 26px;
    font-weight: 700;
    font-family: 'Rajdhani', sans-serif;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }
  #current-task {
    background: rgba(255,165,0,0.08);
    border: 1px solid rgba(255,165,0,0.25);
    border-left: 3px solid var(--warn);
    border-radius: 0 6px 6px 0;
    padding: 10px 12px;
    margin-bottom: 14px;
    min-height: 44px;
  }
  #task-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  #task-text {
    font-size: 13px;
    font-weight: 600;
    color: var(--warn);
  }
  .hud-btn {
    width: 100%;
    padding: 9px;
    border-radius: 6px;
    border: 1px solid rgba(0,180,216,0.4);
    background: linear-gradient(135deg, rgba(0,119,182,.6), rgba(0,180,216,.4));
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
  }
  .hud-btn:hover {
    background: linear-gradient(135deg, rgba(0,119,182,.9), rgba(0,180,216,.7));
    box-shadow: 0 0 20px rgba(0,180,216,.3);
  }

  /* WINDOW */
  .win {
    position: absolute;
    min-width: 340px;
    background: #202030;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    box-shadow:
      0 32px 80px rgba(0, 0, 0, 0.7),
      0 0 0 1px rgba(255,255,255,.04),
      inset 0 1px 0 rgba(255,255,255,.07);
    z-index: 50;
    overflow: hidden;
    animation: winPop .2s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes winPop {
    from { opacity:0; transform:scale(.92) translateY(12px); }
    to   { opacity:1; transform:scale(1) translateY(0); }
  }
  .win.minimizing { animation: winMin .2s ease forwards; }
  @keyframes winMin { to { opacity:0; transform:scale(.8) translateY(60px); } }
  .win.closing { animation: winClose .18s ease forwards; }
  @keyframes winClose { to { opacity:0; transform:scale(.95); } }
  .win.maximized {
    border-radius: 0 !important;
    left: 0 !important; top: 0 !important;
    width: 100vw !important;
    height: calc(100vh - 48px) !important;
    min-width: unset;
    z-index: 60;
  }

  /* Title bar */
  .win-titlebar {
    display: flex;
    align-items: center;
    height: 32px;
    background: #2d2d42;
    padding: 0 10px;
    gap: 8px;
    cursor: move;
    user-select: none;
    border-radius: 8px 8px 0 0;
  }
  .win.maximized .win-titlebar { border-radius: 0; }
  .win-icon { font-size: 14px; }
  .win-title-text {
    font-size: 12px;
    color: #ccc;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .win-controls {
    display: flex;
    margin-right: -10px;
    height: 32px;
  }
  .ctrl-btn {
    width: 46px;
    height: 32px;
    border: none;
    background: transparent;
    color: #bbb;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .1s, color .1s;
    position: relative;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,.1); color: #fff; }
  .ctrl-btn.btn-close:hover { background: var(--close-red); color: #fff; }
  .ctrl-btn.last { border-radius: 0 8px 0 0; }
  .win.maximized .ctrl-btn.last { border-radius: 0; }

  /* No target highlighting */

  /* Window body */
  .win-body { padding: 20px 24px 24px; }
  .win-app-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,.07);
  }
  .win-app-icon-large {
    width: 40px; height: 40px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .win-app-name { font-size: 16px; font-weight: 600; color: #fff; }
  .win-app-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .win-content  { font-size: 13px; color: #9a9ab0; line-height: 1.6; margin-bottom: 16px; }
  .task-indicator {
    background: rgba(255,165,0,.1);
    border: 1px solid rgba(255,165,0,.3);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ti-icon { font-size: 20px; }
  .ti-main { font-size: 13px; font-weight: 600; color: var(--warn); }
  .ti-hint { display: none; }

  /* Taskbar */
  #taskbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: rgba(10,10,20,.88);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,.08);
    z-index: 500;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 4px;
  }
  #taskbar-start {
    width: 36px; height: 36px;
    border-radius: 6px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    margin-right: 8px;
    flex-shrink: 0;
    transition: transform .15s;
  }
  #taskbar-start:hover { transform: scale(1.06); }
  #taskbar-items { display: flex; gap: 4px; flex: 1; overflow: hidden; }
  .tb-item {
    height: 36px;
    padding: 0 12px;
    border-radius: 6px;
    background: rgba(255,255,255,.07);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,.06);
    transition: background .15s;
    max-width: 160px;
  }
  .tb-item:hover { background: rgba(255,255,255,.13); }
  .tb-item.minimized { opacity: .5; }
  .tb-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #clock {
    margin-left: auto;
    text-align: right;
    font-size: 11px;
    color: var(--text);
    line-height: 1.5;
    flex-shrink: 0;
  }

  /* Score popup */
  .score-pop {
    position: fixed;
    font-family: 'Rajdhani', sans-serif;
    font-size: 26px;
    font-weight: 700;
    pointer-events: none;
    z-index: 2000;
    animation: popA .9s ease forwards;
    text-shadow: 0 0 16px currentColor;
  }
  .score-pop.good { color: var(--success); }
  .score-pop.bad  { color: var(--danger); }
  @keyframes popA {
    0%   { opacity:1; transform:translateY(0) scale(1); }
    100% { opacity:0; transform:translateY(-70px) scale(1.3); }
  }

  /* Level banner */
  #lvl-banner {
    position: fixed;
    top:50%; left:50%;
    transform: translate(-50%,-50%) scale(.8);
    background: linear-gradient(135deg, #003366, #006699);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 24px 48px;
    text-align: center;
    z-index: 3000;
    opacity: 0;
    pointer-events: none;
    transition: all .3s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 0 60px rgba(0,180,216,.4);
  }
  #lvl-banner.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
  #lvl-banner .big { font-size:32px; font-weight:700; font-family:'Rajdhani',sans-serif; color:#fff; }
  #lvl-banner .sub { font-size:14px; color:var(--accent); margin-top:4px; }

  /* Wrong flash */
  .wrong-flash {
    position:fixed; inset:0;
    background: rgba(255,50,50,.08);
    pointer-events:none;
    z-index:1999;
    animation: wf .3s ease forwards;
  }
  @keyframes wf { to { opacity:0; } }
</style>
</head>
<body>

<div id="desktop"></div>

<div id="hud">
  <div id="hud-title"><div class="hud-dot"></div>Тренажер Windows</div>
  <div class="stats">
    <div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Рахунок</div></div>
    <div class="stat"><div class="stat-value" id="level">1</div><div class="stat-label">Рівень</div></div>
    <div class="stat"><div class="stat-value" id="streak">0</div><div class="stat-label">Серія</div></div>
  </div>
  <div id="current-task">
    <div id="task-label">// ЗАВДАННЯ</div>
    <div id="task-text">Натисніть "Почати гру"</div>
  </div>
  <button class="hud-btn" onclick="toggleGame()" id="main-btn">▶ Почати гру</button>
</div>

<div id="taskbar">
  <div id="taskbar-start">⊞</div>
  <div id="taskbar-items"></div>
  <div id="clock"></div>
</div>

<div id="lvl-banner">
  <div class="big">🖥 РІВЕНЬ <span id="lvl-num">2</span></div>
  <div class="sub">Швидкість збільшується!</div>
</div>

<script>
const APPS = [
  { name:'Провідник',          icon:'📁', desc:'Перегляд файлів і папок на комп\'ютері.' },
  { name:'Блокнот',            icon:'📝', desc:'Простий текстовий редактор Windows.' },
  { name:'Калькулятор',        icon:'🔢', desc:'Виконання математичних обчислень.' },
  { name:'Microsoft Edge',     icon:'🌐', desc:'Веб-браузер від Microsoft.' },
  { name:'Paint',              icon:'🎨', desc:'Редагування зображень та малювання.' },
  { name:'Диспетчер завдань',  icon:'⚙️', desc:'Управління процесами та ресурсами.' },
  { name:'Фотографії',         icon:'🖼️', desc:'Перегляд та редагування фотографій.' },
  { name:'Параметри',          icon:'🔧', desc:'Налаштування системи Windows.' },
];

// All 4 task types
const TASKS = [
  {
    id:'close',
    label:'Закрийте вікно',
    hint:'Натисніть кнопку ✕ у правому куті заголовка',
    emoji:'',
    targetBtn:'close'
  },
  {
    id:'minimize',
    label:'Згорніть вікно',
    hint:'Натисніть кнопку  —  (мінімізувати)',
    emoji:'',
    targetBtn:'min'
  },
  {
    id:'maximize',
    label:'Розгорніть вікно',
    hint:'Натисніть кнопку  □  (розгорнути на весь екран)',
    emoji:'',
    targetBtn:'max'
  },
  {
    id:'restore',
    label:'❐ Відновіть розмір вікна',
    hint:'Натисніть кнопку ❐ (відновити попередній розмір)',
    emoji:'❐',
    targetBtn:'max'
  },
];

let score=0, level=1, streak=0, running=false;
let wins=[], nextId=0, spawnTimer=null;

/* ---- Spawn ---- */
function spawnWindow() {
  if (!running) return;
  const id = nextId++;
  const app  = APPS[Math.floor(Math.random()*APPS.length)];

  // At level 1-2 pick from close/min/max; restore unlocks at level 2+
  const pool = level >= 2 ? TASKS : TASKS.filter(t=>t.id!=='restore');
  const task = pool[Math.floor(Math.random()*pool.length)];

  const startMaximized = (task.id === 'restore');
  const obj = { id, el:null, task, minimized:false, maximized:startMaximized, dead:false };

  const el = document.createElement('div');
  el.className = 'win' + (startMaximized ? ' maximized' : '');
  el.dataset.id = id;

  if (!startMaximized) {
    const mxX = Math.max(60, window.innerWidth  - 460);
    const mxY = Math.max(60, window.innerHeight - 300);
    el.style.left = (80 + Math.random()*mxX) + 'px';
    el.style.top  = (60 + Math.random()*mxY) + 'px';
  }

  el.innerHTML = buildWinHTML(app, task, startMaximized, level, score);

  // Wire buttons
  const btnClose = el.querySelector('.ctrl-btn.btn-close');
  const btnMin   = el.querySelector('.ctrl-btn.btn-min');
  const btnMax   = el.querySelector('.ctrl-btn.btn-max');

  btnClose.addEventListener('click', e => { e.stopPropagation(); doAction(obj, el, 'close',    task); });
  btnMin.addEventListener  ('click', e => { e.stopPropagation(); doAction(obj, el, 'minimize', task); });
  btnMax.addEventListener  ('click', e => { e.stopPropagation(); doAction(obj, el, obj.maximized ? 'restore' : 'maximize', task); });

  makeDraggable(el);
  document.getElementById('desktop').appendChild(el);
  addTbItem(id, app, el, obj);

  obj.el = el;
  wins.push(obj);

  // Update HUD task
  document.getElementById('task-text').textContent = task.label;
}

function buildWinHTML(app, task, isMax, lv, sc) {
  const closeTarget = task.targetBtn === 'close';
  const minTarget   = task.targetBtn === 'min';
  const maxTarget   = task.targetBtn === 'max';

  const maxIcon = isMax
    ? `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x=".5" y="2.5" width="7" height="7" rx=".5" stroke="#bbb"/><path d="M2.5.5h7v7" stroke="#bbb" stroke-linecap="round"/></svg>`
    : `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x=".5" y=".5" width="9" height="9" rx=".5" stroke="#bbb"/></svg>`;

  return `
    <div class="win-titlebar">
      <span class="win-icon">${app.icon}</span>
      <span class="win-title-text">${app.name}</span>
      <div class="win-controls">
        <button class="ctrl-btn btn-min" title="Згорнути">
          <svg width="10" height="1" viewBox="0 0 10 1"><line x1="0" y1=".5" x2="10" y2=".5" stroke="#bbb"/></svg>
        </button>
        <button class="ctrl-btn btn-max" title="${isMax?'Відновити':'Розгорнути'}">
          ${maxIcon}
        </button>
        <button class="ctrl-btn btn-close last" title="Закрити">✕</button>
      </div>
    </div>
    <div class="win-body">
      <div class="win-app-header">
        <div class="win-app-icon-large">${app.icon}</div>
        <div>
          <div class="win-app-name">${app.name}</div>
          <div class="win-app-sub">Windows 11 — Рівень ${lv} | Рахунок: ${sc}</div>
        </div>
      </div>
      <p class="win-content">${app.desc}</p>
      <div class="task-indicator">
        <div class="ti-icon">${task.emoji}</div>
        <div>
          <div class="ti-main">${task.label}</div>
          <div class="ti-hint">${task.hint}</div>
        </div>
      </div>
    </div>`;
}

/* ---- Action ---- */
function doAction(obj, el, action, task) {
  if (obj.dead) return;

  if (action !== task.id) {
    // Wrong button pressed
    wrongClick(el);
    return;
  }

  // ✅ Correct
  obj.dead = true;
  const pts = 10 + streak*2;
  score += pts;
  streak++;
  if (streak > 0 && streak % 5 === 0) {
    level = Math.floor(streak/5)+1;
    showLvlBanner(level);
  }
  updateHUD();
  showScorePop(el, '+'+pts, 'good');

  if (action === 'close') {
    animThenRemove(el, 'closing', 180, obj.id);
  } else if (action === 'minimize') {
    el.classList.add('minimizing');
    setTimeout(() => {
      el.style.display = 'none';
      obj.minimized = true;
      obj.dead = false; // keep in taskbar
      const tb = document.getElementById('tb-'+obj.id);
      if (tb) tb.classList.add('minimized');
    }, 200);
  } else if (action === 'maximize') {
    el.classList.add('maximized');
    obj.maximized = true;
    refreshMaxBtn(el, true);
  } else if (action === 'restore') {
    el.classList.remove('maximized');
    obj.maximized = false;
    refreshMaxBtn(el, false);
  }

  scheduleNext(action);
}

function refreshMaxBtn(el, isMax) {
  const btn = el.querySelector('.ctrl-btn.btn-max');
  if (!btn) return;
  btn.innerHTML = isMax
    ? `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x=".5" y="2.5" width="7" height="7" rx=".5" stroke="#bbb"/><path d="M2.5.5h7v7" stroke="#bbb" stroke-linecap="round"/></svg>`
    : `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x=".5" y=".5" width="9" height="9" rx=".5" stroke="#bbb"/></svg>`;
  btn.title = isMax ? 'Відновити' : 'Розгорнути';
}

function scheduleNext(action) {
  const delay = Math.max(350, 1500 - level*100);
  clearTimeout(spawnTimer);
  // For non-destructive actions, close the window first then spawn new
  if (action !== 'close' && action !== 'minimize') {
    spawnTimer = setTimeout(() => {
      wins.forEach(w => {
        if (!w.dead) return;
        animThenRemove(w.el, 'closing', 180, w.id);
      });
      setTimeout(spawnWindow, 190);
    }, delay);
  } else {
    spawnTimer = setTimeout(spawnWindow, delay);
  }
}

function animThenRemove(el, cls, ms, id) {
  el.classList.add(cls);
  setTimeout(() => { el.remove(); removeTbItem(id); }, ms);
}

/* ---- Wrong click ---- */
function wrongClick(el) {
  streak = Math.max(0, streak-1);
  score  = Math.max(0, score-5);
  updateHUD();
  showScorePop(el, '-5', 'bad');
  const f = document.createElement('div');
  f.className = 'wrong-flash';
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 300);
  // shake
  let s=0;
  el.style.transition='transform .05s';
  const iv = setInterval(() => {
    el.style.transform = `translateX(${s%2===0?-7:7}px)`;
    if (++s > 5) { clearInterval(iv); el.style.transform=''; el.style.transition=''; }
  }, 50);
}

/* ---- Drag ---- */
function makeDraggable(el) {
  let drag=false, ox=0, oy=0;
  el.querySelector('.win-titlebar').addEventListener('mousedown', e => {
    if (e.target.closest('.win-controls')) return;
    if (el.classList.contains('maximized')) return;
    drag=true; ox=e.clientX-el.offsetLeft; oy=e.clientY-el.offsetTop;
    el.style.userSelect='none';
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    el.style.left=(e.clientX-ox)+'px';
    el.style.top =(e.clientY-oy)+'px';
  });
  document.addEventListener('mouseup', () => { drag=false; el.style.userSelect=''; });
}

/* ---- Taskbar ---- */
function addTbItem(id, app, el, obj) {
  const d = document.createElement('div');
  d.className = 'tb-item';
  d.id = 'tb-'+id;
  d.innerHTML = `<span>${app.icon}</span><span>${app.name}</span>`;
  d.addEventListener('click', () => {
    if (!el) return;
    if (el.style.display === 'none') {
      el.style.display='';
      el.classList.remove('minimizing');
      obj.minimized=false;
      d.classList.remove('minimized');
    } else {
      el.style.display='none';
      obj.minimized=true;
      d.classList.add('minimized');
    }
  });
  document.getElementById('taskbar-items').appendChild(d);
}
function removeTbItem(id) {
  const e = document.getElementById('tb-'+id);
  if (e) e.remove();
}

/* ---- Score popup ---- */
function showScorePop(el, txt, cls) {
  const r = el.getBoundingClientRect();
  const p = document.createElement('div');
  p.className = 'score-pop '+cls;
  p.textContent = txt;
  p.style.left = (r.left+r.width/2-20)+'px';
  p.style.top  = (r.top+30)+'px';
  document.body.appendChild(p);
  setTimeout(()=>p.remove(), 900);
}

/* ---- Level banner ---- */
function showLvlBanner(lvl) {
  document.getElementById('lvl-num').textContent = lvl;
  const b = document.getElementById('lvl-banner');
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'), 2000);
}

/* ---- HUD update ---- */
function updateHUD() {
  document.getElementById('score').textContent  = score;
  document.getElementById('level').textContent  = level;
  document.getElementById('streak').textContent = streak;
}

/* ---- Toggle game ---- */
function toggleGame() {
  running = !running;
  const btn = document.getElementById('main-btn');
  if (running) {
    btn.textContent = '■ Зупинити';
    score=0; level=1; streak=0;
    updateHUD();
    wins.forEach(w => { w.el.remove(); removeTbItem(w.id); });
    wins = [];
    spawnWindow();
  } else {
    btn.textContent = '▶ Почати гру';
    clearTimeout(spawnTimer);
    wins.forEach(w => { if (w.el) w.el.remove(); removeTbItem(w.id); });
    wins = [];
    document.getElementById('task-text').textContent = 'Натисніть "Почати гру"';
  }
}

/* ---- Clock ---- */
function updateClock() {
  const n = new Date();
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  const d = n.toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit',year:'numeric'});
  document.getElementById('clock').innerHTML = `<b>${h}:${m}</b><br>${d}`;
}
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
